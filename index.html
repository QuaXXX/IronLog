<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#0a0a0a">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IRONLOG">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0a0a%22/><text x=%2250%22 y=%2250%22 font-family=%22monospace%22 font-size=%2260%22 fill=%22%233d9a50%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 font-weight=%22bold%22>I</text></svg>">
  <meta name="description"
    content="IRONLOG — A brutal, tactical daily habit tracker. Track streaks, crush goals, stay disciplined.">
  <title>IRONLOG — Daily Habit Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: #2a2a2a;
      --green: #3d9a50;
      --green-dim: #2a6e38;
      --green-bright: #4ec463;
      --green-muted: #5a7a60;
      --text: #d4d4d4;
      --text-dim: #6b7c6e;
      --red: #c0392b;
      --red-bright: #e74c3c;
      --font: 'JetBrains Mono', monospace;
    }

    html,
    body {
      height: 100%;
      background: #0a0a0a;
      background-color: #0a0a0a !important;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      overscroll-behavior: none;
    }

    /* ========== APP SHELL ========== */
    #app {
      max-width: 600px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      padding-top: env(safe-area-inset-top);
      background-color: #0a0a0a;
    }

    /* ========== QUOTE FOOTER ========== */
    .quote-footer {
      padding: 32px 24px;
      text-align: center;
      font-size: 10px;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.6;
      opacity: 0.6;
    }

    .quote-footer .quote-author {
      display: block;
      margin-top: 8px;
      font-weight: 700;
      font-style: normal;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--green-muted);
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--green);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    header .subtitle {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ========== MONTH NAVIGATION ========== */
    .month-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 32px 16px 16px;
      flex-shrink: 0;
      position: sticky;
      left: 0;
      z-index: 1;
      width: max-content;
      min-width: 100%;
    }

    .month-nav-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 14px;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .month-nav-btn:hover {
      background: var(--surface2);
      border-color: var(--green-dim);
      color: var(--green);
    }

    .month-nav-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .month-label {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .month-label .today-jump {
      display: inline-block;
      margin-left: 6px;
      font-size: 11px;
      color: var(--green);
      cursor: pointer;
      font-weight: 400;
      letter-spacing: 0;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .month-label .today-jump:hover {
      opacity: 1;
    }

    /* ========== CONTENT AREA ========== */
    .content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      opacity: 0;
      transform: translateY(10px);
    }

    .view.active {
      display: flex;
      animation: viewEnter 0.3s ease forwards;
    }

    @keyframes viewEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ========== HABIT GRID ========== */
    .grid-wrapper {
      flex: 1;
      overflow: auto;
      padding: 8px 0;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
    }

    .grid-table {
      border-collapse: collapse;
      flex: 1;
    }

    /* Sticky habit name column */
    .grid-table thead th:first-child,
    .grid-table tbody td:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      background: var(--bg);
    }

    .grid-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: var(--bg);
      font-size: 9px;
      font-weight: 400;
      padding: 2px 0px 6px;
      text-align: center;
      letter-spacing: 0;
      text-transform: uppercase;
      white-space: nowrap;
      color: var(--text-dim);
    }

    /* First header cell (habit label) has highest z-index since it's sticky both ways */
    .grid-table thead th:first-child {
      z-index: 5;
    }

    .grid-table thead th .day-num {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.3;
    }

    .grid-table thead th .day-name {
      display: block;
      font-size: 8px;
      color: var(--text-dim);
      line-height: 1.2;
    }

    .grid-table thead th.today-col .day-num {
      color: var(--green-bright);
    }

    .grid-table thead th.today-col .day-name {
      color: var(--green);
    }

    .grid-table thead th.today-col {
      border-bottom: 2px solid var(--green);
    }

    .grid-table thead th:first-child {
      text-align: left;
      padding-left: 8px;
      min-width: 130px;
      font-size: 10px;
    }

    /* ========== HABIT ROW ========== */
    .row-enter {
      animation: rowSlideIn 0.3s ease-out forwards;
    }

    @keyframes rowSlideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .grid-table tbody tr:hover {
      background: var(--surface);
    }

    .grid-table tbody tr:hover td:first-child {
      background: var(--surface);
    }

    .grid-table td {
      text-align: center;
      vertical-align: middle;
      padding: 5px 2px;
    }

    /* Habit name cell */
    .habit-name-cell {
      text-align: left !important;
      padding-left: 8px !important;
      padding-right: 4px !important;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }

    .habit-name-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .habit-name {
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 11px;
      outline: none;
      cursor: text;
      padding: 2px 0;
      border-bottom: 1px solid transparent;
      min-width: 0;
      flex: 1;
    }

    .habit-name:focus {
      border-bottom: 1px solid var(--green-dim);
    }

    /* Delete button */
    .delete-btn {
      flex-shrink: 0;
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 11px;
      width: 18px;
      height: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
    }

    tr:hover .delete-btn {
      opacity: 0.5;
    }

    .delete-btn:hover {
      opacity: 1 !important;
      color: var(--red-bright);
      border-color: var(--red);
    }

    @media (hover: none) {
      .delete-btn {
        opacity: 0.4;
      }
    }

    /* Streak badge */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      font-size: 9px;
      color: var(--green-bright);
      margin-left: 2px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .streak-badge .fire {
      display: inline-block;
      animation: flicker 0.6s ease-in-out infinite alternate;
    }

    @keyframes flicker {
      0% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.7;
        transform: scale(0.92);
      }

      100% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    /* Today column highlight */
    .grid-table td.today-col {
      border-left: 1px solid var(--green-dim);
      border-right: 1px solid var(--green-dim);
      background: rgba(61, 154, 80, 0.06);
    }

    /* ========== CHECK CELL ========== */
    .check-cell {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 11px;
      user-select: none;
    }

    .check-cell:hover {
      border-color: var(--green-dim);
    }

    .check-cell.checked {
      border-color: var(--green);
      background: rgba(61, 154, 80, 0.15);
      color: var(--green-bright);
    }

    .check-cell.checked::after {
      content: '✓';
      font-weight: 700;
      animation: checkPulse 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes checkPulse {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }

      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ========== ADD HABIT BTN ========== */
    .add-habit-bar {
      flex-shrink: 0;
      padding: 10px 100px;
      border-top: 1px solid var(--border);
    }

    #addHabitBtn {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--green);
      font-family: var(--font);
      font-size: 13px;
      padding: 12px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, border-color 0.15s;
    }

    #addHabitBtn:hover {
      background: var(--surface2);
      border-color: var(--green-dim);
    }

    /* ========== STATS VIEW — FULL REVAMP ========== */
    .stats-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .stats-section {
      margin-bottom: 20px;
    }

    .stats-section h2 {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: 10px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stats-section h2 .section-icon {
      font-size: 11px;
      opacity: 0.7;
    }

    /* Stats view toggle */
    .stats-toggle {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .stats-toggle-btn {
      flex: 1;
      background: var(--surface);
      border: none;
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 10px;
      padding: 9px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s;
    }

    .stats-toggle-btn.active {
      background: var(--green);
      color: #000;
      font-weight: 700;
    }

    .stats-toggle-btn:not(:last-child) {
      border-right: 1px solid var(--border);
    }

    /* ---- DISCIPLINE SCORE (top card) ---- */
    .disc-score-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .disc-score-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--green);
    }

    .disc-grade {
      font-size: 64px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 4px;
    }

    .disc-grade.grade-s { color: #4ec463; text-shadow: 0 0 20px rgba(78, 196, 99, 0.3); }
    .disc-grade.grade-a { color: #3d9a50; }
    .disc-grade.grade-b { color: #7aa844; }
    .disc-grade.grade-c { color: #c4a833; }
    .disc-grade.grade-d { color: #c47833; }
    .disc-grade.grade-f { color: #c0392b; }

    .disc-pct {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 1px;
    }

    .disc-verdict {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
      padding: 6px 12px;
      display: inline-block;
      border: 1px solid var(--border);
      background: var(--surface2);
    }

    .disc-verdict.v-elite { color: #4ec463; border-color: #4ec463; }
    .disc-verdict.v-solid { color: #3d9a50; border-color: #3d9a50; }
    .disc-verdict.v-decent { color: #7aa844; border-color: #7aa844; }
    .disc-verdict.v-mid { color: #c4a833; border-color: #c4a833; }
    .disc-verdict.v-weak { color: #c47833; border-color: #c47833; }
    .disc-verdict.v-failing { color: #c0392b; border-color: #c0392b; }

    /* ---- STAT TILES (2-col grid) ---- */
    .stat-tiles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-tile {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 12px 10px;
      text-align: center;
    }

    .stat-tile .st-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
    }

    .stat-tile .st-num.st-red { color: #c0392b; }
    .stat-tile .st-num.st-yellow { color: #c4a833; }
    .stat-tile .st-num.st-bright { color: #4ec463; }

    .stat-tile .st-label {
      font-size: 8px;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ---- MOMENTUM CHART (weekly bars) ---- */
    .momentum-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
      padding: 0 2px;
    }

    .momentum-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100%;
      justify-content: flex-end;
    }

    .momentum-bar {
      width: 100%;
      min-height: 2px;
      background: var(--green-dim);
      transition: height 0.4s ease;
      position: relative;
    }

    .momentum-bar.bar-hot { background: #4ec463; }
    .momentum-bar.bar-warm { background: #3d9a50; }
    .momentum-bar.bar-cool { background: #7aa844; }
    .momentum-bar.bar-cold { background: #c4a833; }
    .momentum-bar.bar-ice { background: #c0392b; }
    .momentum-bar.bar-current {
      border: 1px solid #4ec463;
      box-shadow: 0 0 6px rgba(78, 196, 99, 0.2);
    }

    .momentum-label {
      font-size: 7px;
      color: var(--text-dim);
      margin-top: 4px;
      text-align: center;
      letter-spacing: 0;
    }

    .momentum-trend {
      text-align: center;
      margin-top: 10px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .momentum-trend .trend-up { color: #4ec463; }
    .momentum-trend .trend-down { color: #c0392b; }
    .momentum-trend .trend-flat { color: #c4a833; }

    /* ---- HABIT INTEL ---- */
    .habit-intel-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .hi-status-pip {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .hi-status-pip.pip-dominant { background: #4ec463; box-shadow: 0 0 6px rgba(78,196,99,0.4); }
    .hi-status-pip.pip-solid { background: #3d9a50; }
    .hi-status-pip.pip-slacking { background: #c4a833; }
    .hi-status-pip.pip-awol { background: #c0392b; }

    .hi-info {
      flex: 1;
      min-width: 0;
    }

    .hi-name {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hi-meta {
      font-size: 8px;
      color: var(--text-dim);
      margin-top: 2px;
      letter-spacing: 0.5px;
    }

    .hi-right {
      text-align: right;
      flex-shrink: 0;
    }

    .hi-pct {
      font-size: 14px;
      font-weight: 700;
    }

    .hi-pct.pct-high { color: #4ec463; }
    .hi-pct.pct-mid { color: #c4a833; }
    .hi-pct.pct-low { color: #c0392b; }

    .hi-rank {
      font-size: 7px;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .hi-rank.rank-dominant { color: #4ec463; }
    .hi-rank.rank-solid { color: #3d9a50; }
    .hi-rank.rank-slacking { color: #c4a833; }
    .hi-rank.rank-awol { color: #c0392b; }

    /* ---- WEAK POINTS ---- */
    .weak-points-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .weak-point-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-left: 3px solid #c0392b;
    }

    .weak-point-card.wp-warn {
      border-left-color: #c4a833;
    }

    .wp-icon {
      font-size: 16px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    .wp-info {
      flex: 1;
      min-width: 0;
    }

    .wp-title {
      font-size: 10px;
      color: var(--text);
      font-weight: 600;
    }

    .wp-detail {
      font-size: 8px;
      color: var(--text-dim);
      margin-top: 1px;
      letter-spacing: 0.5px;
    }

    /* ---- HEATMAP (kept but refined) ---- */
    .heatmap-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .heatmap-cell {
      aspect-ratio: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
    }

    .heatmap-cell.lvl-1 { background: rgba(61, 154, 80, 0.2); border-color: rgba(61, 154, 80, 0.3); }
    .heatmap-cell.lvl-2 { background: rgba(61, 154, 80, 0.4); border-color: rgba(61, 154, 80, 0.5); }
    .heatmap-cell.lvl-3 { background: rgba(61, 154, 80, 0.6); border-color: rgba(61, 154, 80, 0.7); }
    .heatmap-cell.lvl-4 { background: rgba(61, 154, 80, 0.85); border-color: var(--green); }

    .heatmap-label-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
    }

    .heatmap-label-row span {
      font-size: 8px;
      color: var(--text-dim);
      text-align: center;
      text-transform: uppercase;
    }

    .heatmap-cell .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 4px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 9px;
      padding: 3px 6px;
      white-space: nowrap;
      z-index: 10;
      pointer-events: none;
    }

    .heatmap-cell:hover .tooltip { display: block; }

    /* ---- DAY-OF-WEEK CHART ---- */
    .dow-chart {
      display: flex;
      gap: 4px;
    }

    .dow-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .dow-bar-track {
      width: 100%;
      height: 50px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }

      color: var(--text);

      text-transform: uppercase;
    }

    }

      border: 1px solid var(--border);

    }

      text-transform: uppercase;

      color: var(--green);

      pointer-events: none;

      text-transform: uppercase;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .flash-overlay {
      position: fixed;
      inset: 0;
      background: rgba(61, 154, 80, 0.12);
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
    }

    .flash-overlay.active {
      opacity: 1;
    }

    /* ========== CONFIRM DIALOG ========== */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.show {
      display: flex;
    }

    .confirm-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 24px;
      max-width: 300px;
      width: 90%;
      text-align: center;
    }

    .confirm-box p {
      font-size: 12px;
      margin-bottom: 16px;
      color: var(--text);
    }

    .confirm-box .confirm-actions {
      display: flex;
      gap: 8px;
    }

    .confirm-box button {
      flex: 1;
      padding: 10px;
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      border: 1px solid var(--border);
    }

    .confirm-box .confirm-cancel {
      background: var(--surface);
      color: var(--text-dim);
    }

    .confirm-box .confirm-delete {
      background: var(--red);
      color: #fff;
      border-color: var(--red);
    }

    .install-banner {

      bottom: 0;
      left: 0;

      z-index: 1000;

      justify-content: center;
      align-items: center;
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
    }

    .install-banner.show {
      transform: translateY(0);
    }

    .install-banner-content {
      display: flex;
      align-items: center;
      gap: 16px;
      max-width: 600px;
      width: 100%;
      justify-content: space-between;
    }

    .install-banner-content span {
      font-size: 13px;
      color: var(--text);
      font-weight: 600;
    }

    #installBtn {
      background: var(--green);
      color: #000;
      border: none;
      padding: 8px 16px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
    }

    .month-nav-btn:active,

    }

    /* ========== SCROLLBAR ========== */
    ::-webkit-scrollbar {
      display: none;
    }

    * {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

    function renderQuote() {
      const el = document.getElementById('quoteFooter');
      if (!el) return;

      const todayStr = fmtDate(new Date());

      // Check if we already picked a quote for today
      if (!data.quoteHistory) data.quoteHistory = [];

      const todayEntry = data.quoteHistory.find(e => e.date === todayStr);
      if (todayEntry) {
        // Already picked for today, just show it
        const selected = QUOTES[todayEntry.index] || QUOTES[0];
        el.innerHTML = `"${selected.q}"<span class="quote-author">— ${selected.a}</span>`;
        return;
      }

      // Build set of recently used quote indices (last 30 days)
      const recentIndices = new Set();
      data.quoteHistory.forEach(e => recentIndices.add(e.index));

      // Get available quote indices (not used in last 30 entries)
      let available = [];
      for (let i = 0; i < QUOTES.length; i++) {
        if (!recentIndices.has(i)) available.push(i);
      }

      // If all quotes used recently, reset and allow all
      if (available.length === 0) {
        available = QUOTES.map((_, i) => i);
      }

      // Pick a random quote from available
      const randomIdx = available[Math.floor(Math.random() * available.length)];

      // Record it in history
      data.quoteHistory.push({ date: todayStr, index: randomIdx });

      // Keep only last 30 entries
      if (data.quoteHistory.length > 30) {
        data.quoteHistory = data.quoteHistory.slice(-30);
      }
      saveData();

      const selected = QUOTES[randomIdx];
      el.innerHTML = `"${selected.q}"<span class="quote-author">— ${selected.a}</span>`;
    }

    // ========== DATE UTILS ==========

    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS_SHORT = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    function fmtDate(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function today() {
      return fmtDate(new Date());
    }

    /** Get number of days in a month */
    function daysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    /** Get all date strings for the viewed month, in order 1..N */
    function getMonthDates() {
      const count = daysInMonth(viewYear, viewMonth);
      const dates = [];
      for (let day = 1; day <= count; day++) {
        const d = new Date(viewYear, viewMonth, day);
        dates.push(fmtDate(d));
      }
      return dates;
    }

    function checkKey(habitId, dateStr) {
      return `${habitId}_${dateStr}`;
    }

    function isChecked(habitId, dateStr) {
      return !!data.checks[checkKey(habitId, dateStr)];
    }

    function toggleCheck(habitId, dateStr) {
      vibrate(40);
      const key = checkKey(habitId, dateStr);
      if (data.checks[key]) {
        delete data.checks[key];
      } else {
        data.checks[key] = true;
      }
      saveData();
    }

    // ========== STREAKS ==========

    function currentStreak(habitId) {
      let streak = 0;
      const n = new Date();
      for (let i = 0; i < 9999; i++) {
        const d = new Date(n);
        d.setDate(d.getDate() - i);
        if (isChecked(habitId, fmtDate(d))) {
          streak++;
        } else {
          break;
        }
      }
      return streak;
    }

    function getContinuousDates() {
      const todayDate = new Date();
      let earliest = new Date(todayDate);
      earliest.setMonth(earliest.getMonth() - 2); // 2 months behind default
      
      data.habits.forEach(h => {
        if (h.createdAt) {
          const d = new Date(h.createdAt);
          if (d < earliest && !isNaN(d)) earliest = d;
        }
      });
      Object.keys(data.checks).forEach(k => {
        const ds = k.split('_')[1];
        if (ds) {
          const d = new Date(ds + 'T12:00:00');
          if (d < earliest && !isNaN(d)) earliest = d;
        }
      });

      earliest.setDate(1);
      let latest = new Date(todayDate);
      latest.setMonth(latest.getMonth() + 2); // 2 months ahead
      latest.setDate(daysInMonth(latest.getFullYear(), latest.getMonth()));

      const dates = [];
      let current = new Date(earliest);
      while (current <= latest) {
        dates.push(fmtDate(current));
        current.setDate(current.getDate() + 1);
      }
      return dates;
    }

    function bestStreak(habitId) {
      const dates = Object.keys(data.checks)
        .filter(k => k.startsWith(habitId + '_') && data.checks[k])
        .map(k => k.split('_').slice(1).join('_'))
        .sort();
      if (!dates.length) return 0;
      let best = 1, cur = 1;
      for (let i = 1; i < dates.length; i++) {
        const prev = new Date(dates[i - 1] + 'T12:00:00');
        const next = new Date(dates[i] + 'T12:00:00');
        const diff = (next - prev) / (86400000);
        if (Math.round(diff) === 1) {
          cur++;
          if (cur > best) best = cur;
        } else {
          cur = 1;
        }
      }
      return best;
    }

    // ========== MILESTONES ==========

    function checkMilestones(habitId) {
      const streak = currentStreak(habitId);
      for (const m of MILESTONES) {
        const mKey = `${habitId}_${m}`;
        if (streak >= m && !data.shownMilestones[mKey]) {
          data.shownMilestones[mKey] = true;
          saveData();
          vibrate([100, 50, 100]);
          const habit = data.habits.find(h => h.id === habitId);
          showToast(`🏆 ${habit ? habit.name : 'Habit'} — ${m} DAY STREAK`, 2500);
          return;
        }
      }
    }

    function checkDayComplete() {
      const todayStr = today();
      const allDone = data.habits.length > 0 && data.habits.every(h => isChecked(h.id, todayStr));
      if (allDone) {
        vibrate([100, 50, 100]);
        triggerFlash();
        showToast('DAY COMPLETE', 1800);
      }
    }

      el.classList.add('show');

    function scrollToToday() {
      const wrapper = document.getElementById('gridWrapper');
      const todayTh = document.querySelector('.grid-table thead th.today-col');
      if (!todayTh || !wrapper) return;

      // Calculate scroll position to center today's column
      const thLeft = todayTh.offsetLeft;
      const thWidth = todayTh.offsetWidth;
      const wrapperWidth = wrapper.clientWidth;
      const scrollTarget = thLeft - (wrapperWidth / 2) + (thWidth / 2);

      wrapper.scrollLeft = Math.max(0, scrollTarget);
    }

    function updateMonthLabelOnScroll() {
      const wrapper = document.getElementById('gridWrapper');
      const headerRow = document.getElementById('gridHeader');
      if (!headerRow || !wrapper) return;
      
      const visibleCenter = wrapper.scrollLeft + (wrapper.clientWidth / 2);
      const ths = headerRow.querySelectorAll('th[data-date]');
      
      let closestTh = null;
      let minDiff = Infinity;
      
      for (let i = 0; i < ths.length; i++) {
        const th = ths[i];
        const center = th.offsetLeft + (th.offsetWidth / 2);
        const diff = Math.abs(center - visibleCenter);
        if (diff < minDiff) {
          minDiff = diff;
          closestTh = th;
        } else if (diff > minDiff) {
          // Since columns are ordered, diffs go down then up
          break;
        }
      }
      
      if (closestTh) {
        const dateStr = closestTh.getAttribute('data-date');
        const d = new Date(dateStr + 'T12:00:00');
        const monthLabel = document.getElementById('monthLabel');
        const newLabelText = `${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
        
        let htmlStr = newLabelText;
        // Optionally add 'Jump to Today' if not focused on current month
        const todayDate = new Date();
        if (d.getMonth() !== todayDate.getMonth() || d.getFullYear() !== todayDate.getFullYear()) {
          htmlStr += `<span class="today-jump" id="todayJumpMonth" title="Jump to today">⟳ Today</span>`;
        }
        
        if (monthLabel.innerHTML !== htmlStr) {
          monthLabel.innerHTML = htmlStr;
          const jumpBtn = document.getElementById('todayJumpMonth');
          if (jumpBtn) {
            jumpBtn.addEventListener('click', () => {
              scrollToToday();
            });
          }
        }
      }
    }

    // Attach scroll listener to wrapper
    document.getElementById('gridWrapper').addEventListener('scroll', () => {
      // Throttle slightly or just use rAF
      requestAnimationFrame(updateMonthLabelOnScroll);
    });

    // ---- Helpers ----
    function getMonthPct(year, month) {
      const todayStr = today();
      const dim = daysInMonth(year, month);
      const dates = [];
      for (let d = 1; d <= dim; d++) {
        const ds = fmtDate(new Date(year, month, d));
        if (ds <= todayStr) dates.push(ds);
      }
      if (!dates.length || !data.habits.length) return 0;
      let done = 0, total = 0;
      data.habits.forEach(h => { dates.forEach(ds => { total++; if (isChecked(h.id, ds)) done++; }); });
      return total ? Math.round((done / total) * 100) : 0;
    }

    function getWeekPct(startDate) {
      const todayStr = today();
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(startDate);
        d.setDate(d.getDate() + i);
        const ds = fmtDate(d);
        if (ds <= todayStr) dates.push(ds);
      }
      if (!dates.length || !data.habits.length) return -1;
      let done = 0, total = 0;
      data.habits.forEach(h => { dates.forEach(ds => { total++; if (isChecked(h.id, ds)) done++; }); });
      return total ? Math.round((done / total) * 100) : 0;
    }

    function getGrade(pct) {
      if (pct >= 95) return { grade: 'S', cls: 'grade-s', verdict: 'MACHINE MODE', vcls: 'v-elite' };
      if (pct >= 85) return { grade: 'A', cls: 'grade-a', verdict: 'LOCKED IN', vcls: 'v-solid' };
      if (pct >= 70) return { grade: 'B', cls: 'grade-b', verdict: 'SOLID EFFORT', vcls: 'v-decent' };
      if (pct >= 50) return { grade: 'C', cls: 'grade-c', verdict: 'ROOM TO GROW', vcls: 'v-mid' };
      if (pct >= 30) return { grade: 'D', cls: 'grade-d', verdict: 'FALLING BEHIND', vcls: 'v-weak' };
      return { grade: 'F', cls: 'grade-f', verdict: 'WAKE UP', vcls: 'v-failing' };
    }

    function getHabitRank(pct) {
      if (pct >= 85) return { label: 'DOMINANT', pip: 'pip-dominant', rank: 'rank-dominant', pctCls: 'pct-high' };
      if (pct >= 60) return { label: 'SOLID', pip: 'pip-solid', rank: 'rank-solid', pctCls: 'pct-high' };
      if (pct >= 30) return { label: 'SLACKING', pip: 'pip-slacking', rank: 'rank-slacking', pctCls: 'pct-mid' };
      return { label: 'AWOL', pip: 'pip-awol', rank: 'rank-awol', pctCls: 'pct-low' };
    }



    // ---- 4. HABIT INTEL ----
    function renderHabitIntel() {
      const el = document.getElementById('habitIntel');
      el.innerHTML = '';
      const todayStr = today();
      const dates = getMonthDates().filter(d => d <= todayStr);
      if (!dates.length || !data.habits.length) {
        el.innerHTML = '<div style="color:var(--text-dim);font-size:11px;">No data yet</div>';
        return;
      }

      // Sort habits by completion pct (worst first for awareness)
      const habitData = data.habits.map(habit => {
        const done = dates.filter(d => isChecked(habit.id, d)).length;
        const pct = Math.round((done / dates.length) * 100);
        const cs = currentStreak(habit.id);
        const bs = bestStreak(habit.id);
        return { habit, pct, done, cs, bs };
      }).sort((a, b) => b.pct - a.pct);

      habitData.forEach(hd => {
        const rank = getHabitRank(hd.pct);
        const card = document.createElement('div');
        card.className = 'habit-intel-card';
        card.innerHTML = `
          <div class="hi-status-pip ${rank.pip}"></div>
          <div class="hi-info">
            <div class="hi-name">${escHtml(hd.habit.name)}</div>
            <div class="hi-meta">🔥 ${hd.cs}d streak · Best: ${hd.bs}d · ${hd.done}/${dates.length} days</div>
          </div>
          <div class="hi-right">
            <div class="hi-pct ${rank.pctCls}">${hd.pct}%</div>
            <div class="hi-rank ${rank.rank}">${rank.label}</div>
          </div>
        `;
        el.appendChild(card);
      });
    }



    // ========== YEARLY STATS ==========

    function renderYearlyStats() {
      const todayDate = new Date();
      const year = todayDate.getFullYear();
      const todayStr = today();

      document.getElementById('yearlyTitle').textContent = `${year} Overview`;

      // Calculate summary stats
      let totalChecks = 0;
      let totalPossible = 0;
      let bestMonthPct = 0;
      let bestMonthName = '';
      let totalDaysActive = 0;

      const monthData = [];

      for (let m = 0; m < 12; m++) {
        const dim = daysInMonth(year, m);
        const dates = [];
        for (let d = 1; d <= dim; d++) {
          const dt = new Date(year, m, d);
          const ds = fmtDate(dt);
          if (ds <= todayStr) dates.push(ds);
        }

        if (dates.length === 0) {
          monthData.push({ month: m, pct: -1, done: 0, total: 0 });
          continue;
        }

        let done = 0, total = 0;
        data.habits.forEach(habit => {
          dates.forEach(ds => {
            total++;
            if (isChecked(habit.id, ds)) done++;
          });
        });

        totalChecks += done;
        totalPossible += total;

        // Count active days (at least 1 check)
        dates.forEach(ds => {
          const anyDone = data.habits.some(h => isChecked(h.id, ds));
          if (anyDone) totalDaysActive++;
        });

        const pct = total ? Math.round((done / total) * 100) : 0;
        if (pct > bestMonthPct) {
          bestMonthPct = pct;
          bestMonthName = MONTHS[m].substring(0, 3);
        }

        monthData.push({ month: m, pct, done, total });
      }

      const overallPct = totalPossible ? Math.round((totalChecks / totalPossible) * 100) : 0;

      // Summary cards
      const summaryContainer = document.getElementById('yearlySummary');
      summaryContainer.innerHTML = `
        <div class="yearly-summary-card">
          <div class="ysc-num">${overallPct}%</div>
          <div class="ysc-label">Year Rate</div>
        </div>
        <div class="yearly-summary-card">
          <div class="ysc-num">${totalDaysActive}</div>
          <div class="ysc-label">Active Days</div>
        </div>
        <div class="yearly-summary-card">
          <div class="ysc-num">${bestMonthName || '—'}</div>
          <div class="ysc-label">Best Month</div>
        </div>
      `;

      // Month-by-month cards
      const monthsContainer = document.getElementById('yearlyMonths');
      monthsContainer.innerHTML = '';

      monthData.forEach(md => {
        if (md.pct === -1) return; // future month, skip
        const g = getGrade(md.pct);
        const card = document.createElement('div');
        card.className = 'yearly-month-card';
        card.innerHTML = `
          <div class="yearly-month-header">
            <span class="yearly-month-name">${MONTHS[md.month]}</span>
            <span class="yearly-month-pct" style="color:${md.pct >= 85 ? '#4ec463' : md.pct >= 70 ? '#3d9a50' : md.pct >= 50 ? '#c4a833' : '#c0392b'}">${md.pct}%</span>
          </div>
          <div class="yearly-mini-bar">
            <div class="yearly-mini-bar-fill" style="width:${md.pct}%;background:${md.pct >= 85 ? '#4ec463' : md.pct >= 70 ? '#3d9a50' : md.pct >= 50 ? '#c4a833' : '#c0392b'}"></div>
          </div>
        `;
        monthsContainer.appendChild(card);
      });

      if (monthsContainer.children.length === 0) {
        monthsContainer.innerHTML = '<div style="color:var(--text-dim);font-size:11px;">No data yet</div>';
      }

      // Yearly heatmap
      renderYearlyHeatmap(year);
    }

    function renderYearlyHeatmap(year) {
      const container = document.getElementById('yearlyHeatmapGrid');
      container.innerHTML = '';
      const todayDate = new Date();

      // Start from Jan 1, find the Monday before or on Jan 1
      const jan1 = new Date(year, 0, 1);
      const startDay = new Date(jan1);
      const dow = startDay.getDay();
      const mondayOffset = dow === 0 ? 6 : dow - 1;
      startDay.setDate(startDay.getDate() - mondayOffset);

      // Go to Dec 31 then fill to end of that week
      const dec31 = new Date(year, 11, 31);

      let current = new Date(startDay);
      let cellCount = 0;

      while (current <= dec31 || current.getDay() !== 1) {
        const dateStr = fmtDate(current);
        const isInYear = current.getFullYear() === year;
        const doneH = data.habits.filter(h => isChecked(h.id, dateStr)).length;
        const totalH = data.habits.length || 1;
        const ratio = doneH / totalH;

        const cell = document.createElement('div');
        cell.className = 'heatmap-cell';
        cell.style.aspectRatio = '1';
        if (ratio > 0 && ratio <= 0.25) cell.classList.add('lvl-1');
        else if (ratio > 0.25 && ratio <= 0.5) cell.classList.add('lvl-2');
        else if (ratio > 0.5 && ratio <= 0.75) cell.classList.add('lvl-3');
        else if (ratio > 0.75) cell.classList.add('lvl-4');

        if (!isInYear) cell.style.opacity = '0.1';
        else if (current > todayDate) cell.style.opacity = '0.15';

        const tip = document.createElement('span');
        tip.className = 'tooltip';
        tip.textContent = `${MONTHS[current.getMonth()].substring(0, 3)} ${current.getDate()}: ${doneH}/${data.habits.length}`;
        cell.appendChild(tip);

        container.appendChild(cell);
        current.setDate(current.getDate() + 1);
        cellCount++;

        if (cellCount >= 371) break; // 53 weeks max
      }
    }

    // ========== NAV ==========

    function switchView(viewId) {
      vibrate(30);
      currentView = viewId;
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.nav-btn[data-view="${viewId}"]`).classList.add('active');

      // Show month nav only on today view
      document.getElementById('monthNav').style.display = viewId === 'todayView' ? 'flex' : 'none';

      if (viewId === 'statsView') renderStats();
    }

    // ========== ADD HABIT ==========

    function addHabit() {
      vibrate(30);
      const habit = {
        id: gid(),
        name: 'New habit',
        createdAt: new Date().toISOString(),
      };
      data.habits.push(habit);
      lastAddedHabitId = habit.id;
      saveData();
      renderGrid();

      requestAnimationFrame(() => {
        const inputs = document.querySelectorAll('.habit-name');
        const last = inputs[inputs.length - 1];
        if (last) {
          last.focus();
          last.select();
        }
      });
    }

    // ========== EXPORT ==========

    function exportData() {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `ironlog-export-${today()}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('DATA EXPORTED', 1200);
    }

    function escHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ========== EVENT LISTENERS ==========

    // Nav buttons removed, relying on continuous scroll

    // Forward nav also removed

    // Bottom nav
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

    // Add habit
    document.getElementById('addHabitBtn').addEventListener('click', addHabit);

    // Export
    document.getElementById('exportBtn').addEventListener('click', exportData);

    // ========== ELASTIC SCROLL (RUBBERBAND) ==========
    class ElasticScroll {
      constructor(container) {
        if (!container) return;
        this.container = container;
        this.startY = 0;
        this.currentY = 0;
        this.isDragging = false;
        this.offsetY = 0;

        this.container.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: true });
        this.container.addEventListener('touchmove', this.onTouchMove.bind(this), { passive: false });
        this.container.addEventListener('touchend', this.onTouchEnd.bind(this));
        this.container.addEventListener('touchcancel', this.onTouchEnd.bind(this));
      }

      onTouchStart(e) {
        this.startX = e.touches[0].clientX;
        this.startY = e.touches[0].clientY;
        this.isDragging = true;
        this.offsetY = 0;
        this.isStretching = false;
      }

      onTouchMove(e) {
        if (!this.isDragging) return;

        this.currentX = e.touches[0].clientX;
        this.currentY = e.touches[0].clientY;
        const deltaX = this.currentX - this.startX;
        const deltaY = this.currentY - this.startY;

        // Reject horizontal swipes explicitly
        if (Math.abs(deltaX) > Math.abs(deltaY)) {
          this.isDragging = false;
          return;
        }

        let scrollEl = e.target.closest('.grid-wrapper');
        if (!scrollEl) {
          this.isDragging = false;
          return;
        }

        const atTop = scrollEl.scrollTop <= 0;
        const atBottom = scrollEl.scrollHeight - scrollEl.scrollTop <= scrollEl.clientHeight + 1;
        const noScroll = scrollEl.scrollHeight <= scrollEl.clientHeight;

        if ((atTop || noScroll) && deltaY > 0) {
          if (e.cancelable) e.preventDefault();
          if (!this.isStretching) {
            this.isStretching = true;
            this.container.style.transition = 'none';
          }
          this.offsetY = this.applyResistance(deltaY);
          this.container.style.transform = `translateY(${this.offsetY}px)`;
        } else if ((atBottom || noScroll) && deltaY < 0) {
          if (e.cancelable) e.preventDefault();
          if (!this.isStretching) {
            this.isStretching = true;
            this.container.style.transition = 'none';
          }
          this.offsetY = -this.applyResistance(Math.abs(deltaY));
          this.container.style.transform = `translateY(${this.offsetY}px)`;
        } else {
          if (this.isStretching) {
            this.isStretching = false;
            this.offsetY = 0;
            this.container.style.transform = `translateY(0px)`;
          }
        }
      }

      onTouchEnd() {
        this.isDragging = false;
        if (this.offsetY !== 0) {
          this.container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1.5, 0.5, 1)';
          this.container.style.transform = 'translateY(0px)';
          this.offsetY = 0;
          this.isStretching = false;
        }
      }

      applyResistance(val) {
        return val * 0.35;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new ElasticScroll(document.querySelector('.content'));
    });

    // ========== SWIPE NAVIGATION (REMOVED) ==========
    // Swipe nav to stats view was removed because it conflicted with horizontal scrolling
    // of the continuous grid.

    // ========== INIT ==========
    needsScrollToToday = true;
    renderGrid();
    renderQuote();
  </script>
