<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#0a0a0a">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IRONLOG">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%230a0a0a%22/><text x=%2250%22 y=%2250%22 font-family=%22monospace%22 font-size=%2260%22 fill=%22%233d9a50%22 text-anchor=%22middle%22 dominant-baseline=%22central%22 font-weight=%22bold%22>I</text></svg>">
<meta name="description" content="IRONLOG — A brutal, tactical daily habit tracker. Track streaks, crush goals, stay disciplined.">
<title>IRONLOG — Daily Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1c1c1c;
  --border: #2a2a2a;
  --green: #3d9a50;
  --green-dim: #2a6e38;
  --green-bright: #4ec463;
  --green-muted: #5a7a60;
  --text: #d4d4d4;
  --text-dim: #6b7c6e;
  --red: #c0392b;
  --red-bright: #e74c3c;
  --font: 'JetBrains Mono', monospace;
}

html, body {
  height: 100%;
  background: #0a0a0a;
  background-color: #0a0a0a !important;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden;
  overscroll-behavior: none;
}

/* ========== APP SHELL ========== */
#app {
  max-width: 600px;
  margin: 0 auto;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
  padding-top: env(safe-area-inset-top);
  background-color: #0a0a0a;
}

/* ========== QUOTE FOOTER ========== */
.quote-footer {
  padding: 32px 24px;
  text-align: center;
  font-size: 10px;
  color: var(--text-dim);
  font-style: italic;
  line-height: 1.6;
  opacity: 0.6;
}
.quote-footer .quote-author {
  display: block;
  margin-top: 8px;
  font-weight: 700;
  font-style: normal;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--green-muted);
}

header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--green);
  text-transform: uppercase;
  margin-bottom: 4px;
}

header .subtitle {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ========== MONTH NAVIGATION ========== */
.month-nav {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 12px 16px 8px;
  flex-shrink: 0;
  position: sticky;
  left: 0;
  z-index: 1;
  width: max-content;
  min-width: 100%;
}

.month-nav-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 14px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  flex-shrink: 0;
}

.month-nav-btn:hover {
  background: var(--surface2);
  border-color: var(--green-dim);
  color: var(--green);
}

.month-nav-btn:disabled {
  opacity: 0.3;
  cursor: default;
}

.month-label {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.month-label .today-jump {
  display: inline-block;
  margin-left: 6px;
  font-size: 11px;
  color: var(--green);
  cursor: pointer;
  font-weight: 400;
  letter-spacing: 0;
  opacity: 0.7;
  transition: opacity 0.15s;
}

.month-label .today-jump:hover {
  opacity: 1;
}

/* ========== CONTENT AREA ========== */
.content {
  flex: 1;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

.view { display: none; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; opacity: 0; transform: translateY(10px); }
.view.active { display: flex; animation: viewEnter 0.3s ease forwards; }

@keyframes viewEnter {
  to { opacity: 1; transform: translateY(0); }
}

/* ========== HABIT GRID ========== */
.grid-wrapper {
  flex: 1;
  overflow: auto;
  padding: 8px 0;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  display: flex;
  flex-direction: column;
}

.grid-table {
  border-collapse: collapse;
  flex: 1;
}

/* Sticky habit name column */
.grid-table thead th:first-child,
.grid-table tbody td:first-child {
  position: sticky;
  left: 0;
  z-index: 3;
  background: var(--bg);
}

.grid-table thead th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--bg);
  font-size: 9px;
  font-weight: 400;
  padding: 2px 0px 6px;
  text-align: center;
  letter-spacing: 0;
  text-transform: uppercase;
  white-space: nowrap;
  color: var(--text-dim);
}

/* First header cell (habit label) has highest z-index since it's sticky both ways */
.grid-table thead th:first-child {
  z-index: 5;
}

.grid-table thead th .day-num {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.grid-table thead th .day-name {
  display: block;
  font-size: 8px;
  color: var(--text-dim);
  line-height: 1.2;
}

.grid-table thead th.today-col .day-num {
  color: var(--green-bright);
}

.grid-table thead th.today-col .day-name {
  color: var(--green);
}

.grid-table thead th.today-col {
  border-bottom: 2px solid var(--green);
}

.grid-table thead th:first-child {
  text-align: left;
  padding-left: 8px;
  min-width: 130px;
  font-size: 10px;
}

/* ========== HABIT ROW ========== */
.row-enter {
  animation: rowSlideIn 0.3s ease-out forwards;
}

@keyframes rowSlideIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.grid-table tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}

.grid-table tbody tr:hover {
  background: var(--surface);
}

.grid-table tbody tr:hover td:first-child {
  background: var(--surface);
}

.grid-table td {
  text-align: center;
  vertical-align: middle;
  padding: 5px 2px;
}

/* Habit name cell */
.habit-name-cell {
  text-align: left !important;
  padding-left: 8px !important;
  padding-right: 4px !important;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 150px;
}

.habit-name-wrap {
  display: flex;
  align-items: center;
  gap: 3px;
}

.habit-name {
  background: none;
  border: none;
  color: var(--text);
  font-family: var(--font);
  font-size: 11px;
  outline: none;
  cursor: text;
  padding: 2px 0;
  border-bottom: 1px solid transparent;
  min-width: 0;
  flex: 1;
}

.habit-name:focus {
  border-bottom: 1px solid var(--green-dim);
}

/* Delete button */
.delete-btn {
  flex-shrink: 0;
  background: none;
  border: 1px solid transparent;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  width: 18px;
  height: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.15s, color 0.15s, border-color 0.15s;
}

tr:hover .delete-btn { opacity: 0.5; }
.delete-btn:hover { opacity: 1 !important; color: var(--red-bright); border-color: var(--red); }
@media (hover: none) { .delete-btn { opacity: 0.4; } }

/* Streak badge */
.streak-badge {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  font-size: 9px;
  color: var(--green-bright);
  margin-left: 2px;
  white-space: nowrap;
  flex-shrink: 0;
}

.streak-badge .fire {
  display: inline-block;
  animation: flicker 0.6s ease-in-out infinite alternate;
}

@keyframes flicker {
  0%   { opacity: 1; transform: scale(1); }
  50%  { opacity: 0.7; transform: scale(0.92); }
  100% { opacity: 1; transform: scale(1.05); }
}

/* Today column highlight */
.grid-table td.today-col {
  border-left: 1px solid var(--green-dim);
  border-right: 1px solid var(--green-dim);
  background: rgba(61, 154, 80, 0.06);
}

/* ========== CHECK CELL ========== */
.check-cell {
  width: 22px;
  height: 22px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  font-size: 11px;
  user-select: none;
}

.check-cell:hover {
  border-color: var(--green-dim);
}

.check-cell.checked {
  border-color: var(--green);
  background: rgba(61, 154, 80, 0.15);
  color: var(--green-bright);
}

.check-cell.checked::after {
  content: '✓';
  font-weight: 700;
  animation: checkPulse 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes checkPulse {
  0% { transform: scale(0.5); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* ========== ADD HABIT BTN ========== */
.add-habit-bar {
  flex-shrink: 0;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
}

#addHabitBtn {
  width: 100%;
  background: var(--surface);
  border: 1px dashed var(--border);
  color: var(--green);
  font-family: var(--font);
  font-size: 13px;
  padding: 12px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.15s, border-color 0.15s;
}

#addHabitBtn:hover {
  background: var(--surface2);
  border-color: var(--green-dim);
}

/* ========== STATS VIEW ========== */
.stats-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.stats-section {
  margin-bottom: 24px;
}

.stats-section h2 {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--green);
  margin-bottom: 12px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 6px;
}

.bar-chart-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}

.bar-label {
  width: 100px;
  font-size: 11px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.bar-track {
  flex: 1;
  height: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: var(--green);
  transition: width 0.4s ease;
}

.bar-pct {
  font-size: 10px;
  color: var(--text-dim);
  width: 36px;
  text-align: right;
  flex-shrink: 0;
}

.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
}

.heatmap-cell {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  position: relative;
}

.heatmap-cell.lvl-1 { background: rgba(61, 154, 80, 0.2); border-color: rgba(61, 154, 80, 0.3); }
.heatmap-cell.lvl-2 { background: rgba(61, 154, 80, 0.4); border-color: rgba(61, 154, 80, 0.5); }
.heatmap-cell.lvl-3 { background: rgba(61, 154, 80, 0.6); border-color: rgba(61, 154, 80, 0.7); }
.heatmap-cell.lvl-4 { background: rgba(61, 154, 80, 0.85); border-color: var(--green); }

.heatmap-label-row {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 3px;
  margin-bottom: 4px;
}

.heatmap-label-row span {
  font-size: 9px;
  color: var(--text-dim);
  text-align: center;
  text-transform: uppercase;
}

.heatmap-cell .tooltip {
  display: none;
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 9px;
  padding: 3px 6px;
  white-space: nowrap;
  z-index: 10;
  pointer-events: none;
}

.heatmap-cell:hover .tooltip { display: block; }

.streak-stat-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.streak-stat-row .sname {
  color: var(--text-dim);
  max-width: 50%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.streak-stat-row .sval {
  color: var(--green-bright);
  font-weight: 600;
}

.overall-rate {
  text-align: center;
  padding: 20px 0;
}

.overall-rate .big-num {
  font-size: 48px;
  font-weight: 700;
  color: var(--green);
  line-height: 1;
}

.overall-rate .big-label {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

#exportBtn {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  padding: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}

#exportBtn:hover {
  border-color: var(--green-dim);
  color: var(--green);
  background: var(--surface2);
}

/* ========== BOTTOM NAV ========== */
.bottom-nav {
  display: flex;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
  padding-bottom: env(safe-area-inset-bottom);
}

.nav-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font);
  font-size: 11px;
  padding: 14px 0;
  cursor: pointer;
  letter-spacing: 2px;
  text-transform: uppercase;
  transition: color 0.15s, background 0.15s;
  border-top: 2px solid transparent;
}

.nav-btn.active {
  color: var(--green);
  border-top-color: var(--green);
  background: rgba(61, 154, 80, 0.05);
}

/* ========== TOAST ========== */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  background: var(--surface2);
  border: 1px solid var(--green);
  color: var(--green-bright);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 3px;
  padding: 16px 32px;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  text-transform: uppercase;
  text-align: center;
}

.toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}

.flash-overlay {
  position: fixed;
  inset: 0;
  background: rgba(61, 154, 80, 0.12);
  z-index: 90;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}

.flash-overlay.active { opacity: 1; }

/* ========== CONFIRM DIALOG ========== */
.confirm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 80;
  display: none;
  align-items: center;
  justify-content: center;
}

.confirm-overlay.show { display: flex; }

.confirm-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 24px;
  max-width: 300px;
  width: 90%;
  text-align: center;
}

.confirm-box p {
  font-size: 12px;
  margin-bottom: 16px;
  color: var(--text);
}

.confirm-box .confirm-actions {
  display: flex;
  gap: 8px;
}

.confirm-box button {
  flex: 1;
  padding: 10px;
  font-family: var(--font);
  font-size: 11px;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  border: 1px solid var(--border);
}

.confirm-box .confirm-cancel {
  background: var(--surface);
  color: var(--text-dim);
}

.confirm-box .confirm-delete {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}

/* ========== MICRO-INTERACTIONS ========== */
.month-nav-btn:active, .nav-btn:active, .check-cell:active, #addHabitBtn:active, .delete-btn:active, #exportBtn:active {
  transform: scale(0.92);
  transition: transform 0.1s;
}

/* ========== SCROLLBAR ========== */
::-webkit-scrollbar { display: none; }
* { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>
<body>
<div id="app">


  <!-- CONTENT -->
  <div class="content">
    <!-- TODAY VIEW -->
    <div class="view active" id="todayView">
      <div class="grid-wrapper" id="gridWrapper">
        <!-- MONTH NAVIGATION -->
        <div class="month-nav" id="monthNav">
          <button class="month-nav-btn" id="navPrev" title="Previous month">◀</button>
          <div class="month-label" id="monthLabel">March 2026</div>
          <button class="month-nav-btn" id="navNext" title="Next month">▶</button>
        </div>
        <table class="grid-table" id="habitGrid">
          <thead><tr id="gridHeader"></tr></thead>
          <tbody id="gridBody"></tbody>
        </table>
      </div>
      <div class="add-habit-bar">
        <button id="addHabitBtn">＋ Add habit</button>
      </div>
      <!-- QUOTE FOOTER -->
      <div class="quote-footer" id="quoteFooter"></div>
    </div>

    <!-- STATS VIEW -->
    <div class="view" id="statsView">
      <div class="stats-scroll">
        <div class="stats-section">
          <h2>Overall Completion</h2>
          <div class="overall-rate" id="overallRate">
            <div class="big-num">0%</div>
            <div class="big-label">This month</div>
          </div>
        </div>
        <div class="stats-section">
          <h2>Monthly Completion</h2>
          <div id="weeklyBars"></div>
        </div>
        <div class="stats-section">
          <h2>Best Streaks</h2>
          <div id="bestStreaks"></div>
        </div>
        <div class="stats-section">
          <h2>Monthly Heatmap</h2>
          <div class="heatmap-label-row">
            <span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span>
          </div>
          <div class="heatmap-grid" id="heatmapGrid"></div>
        </div>
        <div style="margin-top:16px;">
          <button id="exportBtn">↓ Export Data (.json)</button>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="todayView" id="navToday">▣ Today</button>
    <button class="nav-btn" data-view="statsView" id="navStats">▤ Stats</button>
  </nav>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>
<div class="flash-overlay" id="flashOverlay"></div>
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <p id="confirmMsg">Delete this habit?</p>
    <div class="confirm-actions">
      <button class="confirm-cancel" id="confirmCancel">Cancel</button>
      <button class="confirm-delete" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<script>
/* =======================================================
   IRONLOG — Vanilla JS Habit Tracker
   Monthly view: columns = each day of the month (1-28/31)
   Navigate between months with ◀ ▶ arrows.
   All data in localStorage. No backend needed.
   ======================================================= */

// ========== DATA ==========

const STORAGE_KEY = 'ironlog_data';
const MILESTONES = [7, 30, 75];

function gid() {
  return Math.random().toString(36).substring(2, 10) + Date.now().toString(36);
}

const DEFAULT_HABITS = [
  { id: gid(), name: 'Workout', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Sleep 7+ hrs', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Read 20 mins', createdAt: new Date().toISOString() },
  { id: gid(), name: 'No junk food', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Study 2+ hrs', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Drink 2L water', createdAt: new Date().toISOString() },
  { id: gid(), name: 'No social media binge', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Cold shower', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Journal / reflect', createdAt: new Date().toISOString() },
  { id: gid(), name: 'Budget check', createdAt: new Date().toISOString() },
];

function loadData() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    try {
      const d = JSON.parse(raw);
      return { habits: d.habits || [], checks: d.checks || {}, shownMilestones: d.shownMilestones || {} };
    } catch { /* corrupted */ }
  }
  return { habits: DEFAULT_HABITS, checks: {}, shownMilestones: {} };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let data = loadData();

// Current month being viewed: { year, month (0-indexed) }
const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth(); // 0-indexed
let currentView = 'todayView';
let needsScrollToToday = true; // flag for initial scroll

// ========== HAPTICS & QUOTES ==========

function vibrate(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

const QUOTES = [
  { q: "We suffer more often in imagination than in reality.", a: "Seneca" },
  { q: "You have power over your mind - not outside events. Realize this, and you will find strength.", a: "Marcus Aurelius" },
  { q: "Don't explain your philosophy. Embody it.", a: "Epictetus" },
  { q: "He who has a why to live for can bear almost any how.", a: "Friedrich Nietzsche" },
  { q: "First say to yourself what you would be; and then do what you have to do.", a: "Epictetus" },
  { q: "Discipline equals freedom.", a: "Jocko Willink" },
  { q: "No man is free who is not master of himself.", a: "Epictetus" }
];

function renderQuote() {
  const el = document.getElementById('quoteFooter');
  if (!el) return;
  const num = new Date().getDate(); // Stable quote for the day
  const selected = QUOTES[num % QUOTES.length];
  el.innerHTML = `"${selected.q}"<span class="quote-author">— ${selected.a}</span>`;
}

// ========== DATE UTILS ==========

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function today() {
  return fmtDate(new Date());
}

/** Get number of days in a month */
function daysInMonth(year, month) {
  return new Date(year, month + 1, 0).getDate();
}

/** Get all date strings for the viewed month, in order 1..N */
function getMonthDates() {
  const count = daysInMonth(viewYear, viewMonth);
  const dates = [];
  for (let day = 1; day <= count; day++) {
    const d = new Date(viewYear, viewMonth, day);
    dates.push(fmtDate(d));
  }
  return dates;
}

function checkKey(habitId, dateStr) {
  return `${habitId}_${dateStr}`;
}

function isChecked(habitId, dateStr) {
  return !!data.checks[checkKey(habitId, dateStr)];
}

function toggleCheck(habitId, dateStr) {
  vibrate(40);
  const key = checkKey(habitId, dateStr);
  if (data.checks[key]) {
    delete data.checks[key];
  } else {
    data.checks[key] = true;
  }
  saveData();
}

// ========== STREAKS ==========

function currentStreak(habitId) {
  let streak = 0;
  const n = new Date();
  for (let i = 0; i < 9999; i++) {
    const d = new Date(n);
    d.setDate(d.getDate() - i);
    if (isChecked(habitId, fmtDate(d))) {
      streak++;
    } else {
      break;
    }
  }
  return streak;
}

function bestStreak(habitId) {
  const dates = Object.keys(data.checks)
    .filter(k => k.startsWith(habitId + '_') && data.checks[k])
    .map(k => k.split('_').slice(1).join('_'))
    .sort();
  if (!dates.length) return 0;
  let best = 1, cur = 1;
  for (let i = 1; i < dates.length; i++) {
    const prev = new Date(dates[i-1] + 'T12:00:00');
    const next = new Date(dates[i] + 'T12:00:00');
    const diff = (next - prev) / (86400000);
    if (Math.round(diff) === 1) {
      cur++;
      if (cur > best) best = cur;
    } else {
      cur = 1;
    }
  }
  return best;
}

// ========== MILESTONES ==========

function checkMilestones(habitId) {
  const streak = currentStreak(habitId);
  for (const m of MILESTONES) {
    const mKey = `${habitId}_${m}`;
    if (streak >= m && !data.shownMilestones[mKey]) {
      data.shownMilestones[mKey] = true;
      saveData();
      vibrate([100, 50, 100]);
      const habit = data.habits.find(h => h.id === habitId);
      showToast(`🏆 ${habit ? habit.name : 'Habit'} — ${m} DAY STREAK`, 2500);
      return;
    }
  }
}

function checkDayComplete() {
  const todayStr = today();
  const allDone = data.habits.length > 0 && data.habits.every(h => isChecked(h.id, todayStr));
  if (allDone) {
    vibrate([100, 50, 100]);
    triggerFlash();
    showToast('DAY COMPLETE', 1800);
  }
}

// ========== TOAST & FLASH ==========

let toastTimer = null;
function showToast(msg, duration = 1500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function triggerFlash() {
  const el = document.getElementById('flashOverlay');
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 300);
}

// ========== CONFIRM DIALOG ==========

let confirmCallback = null;

function showConfirm(msg, onConfirm) {
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOverlay').classList.add('show');
  confirmCallback = onConfirm;
}

document.getElementById('confirmCancel').addEventListener('click', () => {
  document.getElementById('confirmOverlay').classList.remove('show');
  confirmCallback = null;
});

document.getElementById('confirmDelete').addEventListener('click', () => {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
});

// ========== RENDER GRID ==========

let lastAddedHabitId = null;

function renderGrid() {
  const dates = getMonthDates();
  const todayStr = today();
  const todayDate = new Date();

  // Update month label
  const isCurrentMonth = (viewYear === todayDate.getFullYear() && viewMonth === todayDate.getMonth());
  const monthLabel = document.getElementById('monthLabel');
  monthLabel.innerHTML = `${MONTHS[viewMonth]} ${viewYear}`;
  if (!isCurrentMonth) {
    monthLabel.innerHTML += `<span class="today-jump" id="todayJump" title="Jump to current month">⟳ Today</span>`;
  }

  // Disable forward nav if we're on the current month
  document.getElementById('navNext').disabled = isCurrentMonth;

  // Re-attach jump-to-today click
  const jumpEl = document.getElementById('todayJump');
  if (jumpEl) {
    jumpEl.addEventListener('click', () => {
      viewYear = todayDate.getFullYear();
      viewMonth = todayDate.getMonth();
      needsScrollToToday = true;
      renderGrid();
    });
  }

  // Header row
  const headerRow = document.getElementById('gridHeader');
  headerRow.innerHTML = '<th>Habit</th>';

  dates.forEach(dateStr => {
    const d = new Date(dateStr + 'T12:00:00');
    const dayNum = d.getDate();
    const dayName = DAYS_SHORT[d.getDay()];
    const isWeekend = (d.getDay() === 0 || d.getDay() === 6);
    const isToday = (dateStr === todayStr);
    const isFuture = (d > todayDate && dateStr !== todayStr);

    const th = document.createElement('th');
    th.innerHTML = `<span class="day-num">${dayNum}</span><span class="day-name">${dayName}</span>`;
    th.title = dateStr;
    if (isToday) th.classList.add('today-col');
    if (isWeekend && !isToday) th.classList.add('weekend');
    if (isFuture) th.classList.add('future-col');
    th.setAttribute('data-date', dateStr);
    headerRow.appendChild(th);
  });

  // Body
  const tbody = document.getElementById('gridBody');
  tbody.innerHTML = '';

  data.habits.forEach(habit => {
    const tr = document.createElement('tr');
    if (lastAddedHabitId === habit.id) {
      tr.classList.add('row-enter');
      lastAddedHabitId = null;
    }

    // Habit name cell
    const nameTd = document.createElement('td');
    nameTd.className = 'habit-name-cell';

    const wrap = document.createElement('div');
    wrap.className = 'habit-name-wrap';

    // Delete button
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete habit';
    delBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      vibrate(30);
      showConfirm(`Delete "${habit.name}"?`, () => {
        vibrate(80);
        data.habits = data.habits.filter(h => h.id !== habit.id);
        Object.keys(data.checks).forEach(k => {
          if (k.startsWith(habit.id + '_')) delete data.checks[k];
        });
        saveData();
        renderGrid();
      });
    });

    // Name input
    const nameInput = document.createElement('input');
    nameInput.className = 'habit-name';
    nameInput.type = 'text';
    nameInput.value = habit.name;
    nameInput.setAttribute('aria-label', 'Habit name');
    nameInput.addEventListener('change', () => {
      habit.name = nameInput.value.trim() || habit.name;
      saveData();
    });
    nameInput.addEventListener('blur', () => {
      habit.name = nameInput.value.trim() || habit.name;
      saveData();
    });

    wrap.appendChild(delBtn);
    wrap.appendChild(nameInput);

    // Streak badge
    const streak = currentStreak(habit.id);
    if (streak >= 2) {
      const badge = document.createElement('span');
      badge.className = 'streak-badge';
      badge.innerHTML = `<span class="fire">🔥</span>${streak}`;
      wrap.appendChild(badge);
    }

    nameTd.appendChild(wrap);
    tr.appendChild(nameTd);

    // Day cells
    dates.forEach(dateStr => {
      const d = new Date(dateStr + 'T12:00:00');
      const isToday = (dateStr === todayStr);
      const isFuture = (d > todayDate && !isToday);

      const td = document.createElement('td');
      if (isToday) td.classList.add('today-col');
      if (isFuture) td.classList.add('future-col');
      td.setAttribute('data-date', dateStr);

      const cell = document.createElement('div');
      cell.className = 'check-cell';
      if (isChecked(habit.id, dateStr)) cell.classList.add('checked');

      if (isFuture) {
        cell.style.cursor = 'not-allowed';
      } else {
        cell.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleCheck(habit.id, dateStr);
          cell.classList.toggle('checked');
          renderGrid();
          if (isChecked(habit.id, dateStr)) {
            checkMilestones(habit.id);
            checkDayComplete();
          }
        });
      }

      td.appendChild(cell);
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });

  // Auto-scroll to today's column on initial load or when jumping to current month
  if (needsScrollToToday && isCurrentMonth) {
    needsScrollToToday = false;
    requestAnimationFrame(() => {
      scrollToToday();
    });
  }
}

/** Scroll the grid so today's column is visible and roughly centered */
function scrollToToday() {
  const wrapper = document.getElementById('gridWrapper');
  const todayTh = document.querySelector('.grid-table thead th.today-col');
  if (!todayTh || !wrapper) return;

  // Calculate scroll position to center today's column
  const thLeft = todayTh.offsetLeft;
  const thWidth = todayTh.offsetWidth;
  const wrapperWidth = wrapper.clientWidth;
  const scrollTarget = thLeft - (wrapperWidth / 2) + (thWidth / 2);

  wrapper.scrollLeft = Math.max(0, scrollTarget);
}

// ========== STATS ==========

function renderStats() {
  renderMonthlyBars();
  renderBestStreaks();
  renderHeatmap();
  renderOverallRate();
}

function renderMonthlyBars() {
  const container = document.getElementById('weeklyBars');
  container.innerHTML = '';
  const dates = getMonthDates();
  // Only count up to today
  const todayStr = today();
  const validDates = dates.filter(d => d <= todayStr);

  data.habits.forEach(habit => {
    const completed = validDates.filter(d => isChecked(habit.id, d)).length;
    const total = validDates.length || 1;
    const pct = Math.round((completed / total) * 100);

    const item = document.createElement('div');
    item.className = 'bar-chart-item';
    item.innerHTML = `
      <span class="bar-label">${escHtml(habit.name)}</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="bar-pct">${pct}%</span>
    `;
    container.appendChild(item);
  });

  if (!data.habits.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:11px;">No habits yet</div>';
  }
}

function renderBestStreaks() {
  const container = document.getElementById('bestStreaks');
  container.innerHTML = '';

  data.habits.forEach(habit => {
    const bs = bestStreak(habit.id);
    const row = document.createElement('div');
    row.className = 'streak-stat-row';
    row.innerHTML = `<span class="sname">${escHtml(habit.name)}</span><span class="sval">${bs} day${bs !== 1 ? 's' : ''}</span>`;
    container.appendChild(row);
  });

  if (!data.habits.length) {
    container.innerHTML = '<div style="color:var(--text-dim);font-size:11px;">No habits yet</div>';
  }
}

function renderHeatmap() {
  const container = document.getElementById('heatmapGrid');
  container.innerHTML = '';

  // Show heatmap for the currently viewed month, aligned to week grid
  const firstDay = new Date(viewYear, viewMonth, 1);
  const lastDay = new Date(viewYear, viewMonth + 1, 0);
  // Align to Monday
  let startDay = new Date(firstDay);
  const dow = startDay.getDay();
  const mondayOffset = dow === 0 ? 6 : dow - 1;
  startDay.setDate(startDay.getDate() - mondayOffset);

  // Fill until we pass the last day and land on a Sunday
  let current = new Date(startDay);
  const todayDate = new Date();

  while (current <= lastDay || current.getDay() !== 1) {
    const dateStr = fmtDate(current);
    const isInMonth = (current.getMonth() === viewMonth && current.getFullYear() === viewYear);

    const doneH = data.habits.filter(h => isChecked(h.id, dateStr)).length;
    const totalH = data.habits.length || 1;
    const ratio = doneH / totalH;

    const cell = document.createElement('div');
    cell.className = 'heatmap-cell';
    if (ratio > 0 && ratio <= 0.25) cell.classList.add('lvl-1');
    else if (ratio > 0.25 && ratio <= 0.5) cell.classList.add('lvl-2');
    else if (ratio > 0.5 && ratio <= 0.75) cell.classList.add('lvl-3');
    else if (ratio > 0.75) cell.classList.add('lvl-4');

    if (!isInMonth) cell.style.opacity = '0.15';
    else if (current > todayDate) cell.style.opacity = '0.3';

    const tip = document.createElement('span');
    tip.className = 'tooltip';
    tip.textContent = `${MONTHS[current.getMonth()].substring(0,3)} ${current.getDate()}: ${doneH}/${data.habits.length}`;
    cell.appendChild(tip);

    container.appendChild(cell);
    current.setDate(current.getDate() + 1);

    // Safety: break after 42 cells (6 weeks max)
    if (container.children.length >= 42) break;
  }
}

function renderOverallRate() {
  const container = document.getElementById('overallRate');
  const dates = getMonthDates();
  const todayStr = today();
  const validDates = dates.filter(d => d <= todayStr);
  let total = 0, done = 0;

  data.habits.forEach(habit => {
    validDates.forEach(dateStr => {
      total++;
      if (isChecked(habit.id, dateStr)) done++;
    });
  });

  const pct = total ? Math.round((done / total) * 100) : 0;
  container.innerHTML = `
    <div class="big-num">${pct}%</div>
    <div class="big-label">${MONTHS[viewMonth]} ${viewYear}</div>
  `;
}

// ========== NAV ==========

function switchView(viewId) {
  vibrate(30);
  currentView = viewId;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.nav-btn[data-view="${viewId}"]`).classList.add('active');

  // Show month nav only on today view
  document.getElementById('monthNav').style.display = viewId === 'todayView' ? 'flex' : 'none';

  if (viewId === 'statsView') renderStats();
}

// ========== ADD HABIT ==========

function addHabit() {
  vibrate(30);
  const habit = {
    id: gid(),
    name: 'New habit',
    createdAt: new Date().toISOString(),
  };
  data.habits.push(habit);
  lastAddedHabitId = habit.id;
  saveData();
  renderGrid();

  requestAnimationFrame(() => {
    const inputs = document.querySelectorAll('.habit-name');
    const last = inputs[inputs.length - 1];
    if (last) {
      last.focus();
      last.select();
    }
  });
}

// ========== EXPORT ==========

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `ironlog-export-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('DATA EXPORTED', 1200);
}

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== EVENT LISTENERS ==========

// Month nav
document.getElementById('navPrev').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) {
    viewMonth = 11;
    viewYear--;
  }
  needsScrollToToday = false;
  renderGrid();
  // Scroll to start of month when going back
  document.getElementById('gridWrapper').scrollLeft = 0;
});

document.getElementById('navNext').addEventListener('click', () => {
  const todayDate = new Date();
  const isCurrentMonth = (viewYear === todayDate.getFullYear() && viewMonth === todayDate.getMonth());
  if (isCurrentMonth) return; // can't go forward past current month

  viewMonth++;
  if (viewMonth > 11) {
    viewMonth = 0;
    viewYear++;
  }

  // If returning to current month, scroll to today
  const nowCurrentMonth = (viewYear === todayDate.getFullYear() && viewMonth === todayDate.getMonth());
  needsScrollToToday = nowCurrentMonth;
  renderGrid();
  if (!nowCurrentMonth) {
    document.getElementById('gridWrapper').scrollLeft = 0;
  }
});

// Bottom nav
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => switchView(btn.dataset.view));
});

// Add habit
document.getElementById('addHabitBtn').addEventListener('click', addHabit);

// Export
document.getElementById('exportBtn').addEventListener('click', exportData);

// ========== ELASTIC SCROLL (RUBBERBAND) ==========
class ElasticScroll {
  constructor(container) {
    if (!container) return;
    this.container = container;
    this.startY = 0;
    this.currentY = 0;
    this.isDragging = false;
    this.offsetY = 0;

    this.container.addEventListener('touchstart', this.onTouchStart.bind(this), { passive: true });
    this.container.addEventListener('touchmove', this.onTouchMove.bind(this), { passive: false });
    this.container.addEventListener('touchend', this.onTouchEnd.bind(this));
    this.container.addEventListener('touchcancel', this.onTouchEnd.bind(this));
  }

  onTouchStart(e) {
    this.startX = e.touches[0].clientX;
    this.startY = e.touches[0].clientY;
    this.isDragging = true;
    this.offsetY = 0;
    this.isStretching = false;
  }

  onTouchMove(e) {
    if (!this.isDragging) return;
    
    this.currentX = e.touches[0].clientX;
    this.currentY = e.touches[0].clientY;
    const deltaX = this.currentX - this.startX;
    const deltaY = this.currentY - this.startY;

    // Reject horizontal swipes explicitly
    if (Math.abs(deltaX) > Math.abs(deltaY)) {
      this.isDragging = false;
      return;
    }

    let scrollEl = e.target.closest('.grid-wrapper');
    if (!scrollEl) {
      this.isDragging = false;
      return;
    }

    const atTop = scrollEl.scrollTop <= 0;
    const atBottom = scrollEl.scrollHeight - scrollEl.scrollTop <= scrollEl.clientHeight + 1;
    const noScroll = scrollEl.scrollHeight <= scrollEl.clientHeight;

    if ((atTop || noScroll) && deltaY > 0) {
      if (e.cancelable) e.preventDefault();
      if (!this.isStretching) {
        this.isStretching = true;
        this.container.style.transition = 'none';
      }
      this.offsetY = this.applyResistance(deltaY);
      this.container.style.transform = `translateY(${this.offsetY}px)`;
    } else if ((atBottom || noScroll) && deltaY < 0) {
      if (e.cancelable) e.preventDefault();
      if (!this.isStretching) {
        this.isStretching = true;
        this.container.style.transition = 'none';
      }
      this.offsetY = -this.applyResistance(Math.abs(deltaY));
      this.container.style.transform = `translateY(${this.offsetY}px)`;
    } else {
      if (this.isStretching) {
        this.isStretching = false;
        this.offsetY = 0;
        this.container.style.transform = `translateY(0px)`;
      }
    }
  }

  onTouchEnd() {
    this.isDragging = false;
    if (this.offsetY !== 0) {
      this.container.style.transition = 'transform 0.4s cubic-bezier(0.25, 1.5, 0.5, 1)';
      this.container.style.transform = 'translateY(0px)';
      this.offsetY = 0;
      this.isStretching = false;
    }
  }

  applyResistance(val) {
    return val * 0.35;
  }
}

document.addEventListener('DOMContentLoaded', () => {
  new ElasticScroll(document.querySelector('.content'));
});

// ========== INIT ==========
needsScrollToToday = true;
renderGrid();
renderQuote();
